<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB800" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#E0E0E0" stop-opacity="0.08"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#FFB800" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#0A0A0B"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <g opacity="0.9">
    <circle cx="340" cy="260" r="180" fill="url(#g)" filter="url(#blur)"/>
    <circle cx="1220" cy="540" r="220" fill="url(#g)" filter="url(#blur)"/>
  </g>

  <g opacity="0.22" stroke="#E0E0E0" stroke-width="1">
    <path d="M120 740 C 420 560, 620 640, 900 480 S 1380 400, 1520 220" fill="none"/>
    <path d="M80 120 C 260 220, 380 160, 560 260 S 960 360, 1240 260" fill="none"/>
  </g>

  <g opacity="0.12" fill="#FFB800">
    <rect x="118" y="118" width="14" height="14"/>
    <rect x="1468" y="732" width="14" height="14"/>
    <rect x="1010" y="188" width="10" height="10"/>
  </g>
</svg>
